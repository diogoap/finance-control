version: '3.1'

services:
  web:  
    build:
      context: .
      dockerfile: ./docker/web/Dockerfile
    container_name: finance-control-web
    depends_on:
      - mongodb    
    ports:
      - "8500:8500"
    networks:
      - fc-network

  mongodb:
    image: mongo:8.0.9
    container_name: finance-control-db
    networks:
      - fc-network
    volumes:
      - /opt/finance-control/data/db:/config:/data/db 
      - /opt/finance-control/backup_data:/backups/ 

networks:
  fc-network:
    driver: bridge

volumes:
  mongo_data:
  backup_data:
